services:
  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    environment:
      ESP32_IP: ${ESP32_IP:-192.168.139.207}
      ESP32_CONTROL_PORT: "80"
      POLL_INTERVAL_MS: "1500"
      PORT: "3000"
    volumes:
      - alertdrive_alerts:/app/backend/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

# La deteccion (detection/deteccion_dashboard.py) corre directo en Windows,
# NO en Docker: necesita la webcam local de la laptop, y un contenedor Linux
# en Docker Desktop/WSL2 no tiene forma nativa de acceder a ese dispositivo.

volumes:
  alertdrive_alerts:
