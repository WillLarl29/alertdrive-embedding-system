services:
  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    environment:
      ESP32_IP: ${ESP32_IP:-192.168.139.207}
      ESP32_STREAM_PORT: "81"
      ESP32_CONTROL_PORT: "80"
      POLL_INTERVAL_MS: "1500"
      PORT: "3000"
    volumes:
      - alertdrive_alerts:/app/backend/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  detection:
    build:
      context: ./detection
    environment:
      ESP32_IP: ${ESP32_IP:-192.168.139.207}
      BACKEND_URL: http://backend:3000/api/drowsiness
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  alertdrive_alerts:
