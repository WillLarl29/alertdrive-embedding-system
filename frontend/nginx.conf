server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Sitio estatico plano, sin ruteo del lado del cliente: un archivo que no
    # existe debe devolver 404 real, no el index.html (evita 200 enganosos
    # para assets faltantes, ej. una imagen de demo que todavia no se subio).
    location / {
        try_files $uri $uri/ =404;
    }

    # HTML/JS/CSS cambian seguido durante desarrollo (rebuild de imagen); sin
    # esto el navegador puede quedarse con una version vieja cacheada tras un
    # rebuild y mezclar HTML nuevo con JS viejo (bugs fantasma dificiles de
    # diagnosticar). Los assets de imagen si se pueden cachear normalmente.
    location ~* \.(?:html|js|css)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # "^~" es obligatorio en estos tres: sin el modificador, el location regex
    # de arriba (\.js$ etc.) le gana a un location de prefijo normal segun el
    # algoritmo de nginx, e intercepta ej. /socket.io/socket.io.js intentando
    # servirlo como archivo estatico (404) en vez de hacer proxy al backend.

    # /video es un stream MJPEG multipart largo; sin proxy_buffering off nginx
    # espera a acumular el cuerpo completo antes de reenviarlo (video "congelado").
    location ^~ /video {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location ^~ /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
    }

    location ^~ /socket.io/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
