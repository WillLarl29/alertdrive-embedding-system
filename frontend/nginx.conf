server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Sitio estatico plano, sin ruteo del lado del cliente: un archivo que no
    # existe debe devolver 404 real, no el index.html (evita 200 enganosos
    # para assets faltantes, ej. una imagen de demo que todavia no se subio).
    location / {
        try_files $uri $uri/ =404;
    }

    # /video es un stream MJPEG multipart largo; sin proxy_buffering off nginx
    # espera a acumular el cuerpo completo antes de reenviarlo (video "congelado").
    location /video {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
    }

    location /socket.io/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
